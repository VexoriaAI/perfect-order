<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfect Order</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      max-width: 700px;
      width: 90%;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: red;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin: 0;
    }

    strong {
      color: #000;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Recado</h1>
    <p>
      <strong>Lipão</strong>, por favor, veja uma forma de rodar a aplicação do
      <strong>Simulador Perfeito</strong> via browser.
    </p>
  </div>
</body>
</html>
